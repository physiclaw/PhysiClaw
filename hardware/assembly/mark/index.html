<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>mark assembly step</title>
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; background:#f3f4f6; color:#111; }
  #bar { display:flex; gap:8px; align-items:center; padding:8px 12px; background:#fff; border-bottom:1px solid #e5e7eb; box-shadow:0 1px 0 rgba(0,0,0,.02); }
  #bar button { padding:6px 12px; border:1px solid #d1d5db; background:#fff; border-radius:6px; cursor:pointer; font:inherit; }
  #bar button:hover { background:#f9fafb; }
  #bar button:disabled { opacity:.5; cursor:not-allowed; }
  #bar .finish { background:#1e88ff; color:#fff; border-color:#1e88ff; }
  #bar .finish:hover { background:#1976d2; }
  #bar button.active { background:#f59e0b; color:#fff; border-color:#f59e0b; }
  #bar button.active:hover { background:#d97706; }
  #status { margin-left:auto; font-size:13px; color:#374151; }
  #status.err { color:#b91c1c; }
  #status.ok  { color:#15803d; }
  #stage { position:absolute; inset:48px 0 0 240px; overflow:hidden; }
  #stage svg { display:block; width:100%; height:100%; background:#fff; cursor:crosshair; }
  #stage svg.panning { cursor:grabbing; }
  /* mark-* live overlays — the in-progress polyline / vertex dots /
     drag preview all live in #dynamicOverlay and take stroke/fill from
     it via SVG inheritance. CSS only sets non-colour knobs. */
  .mark-line     { stroke-width:2; fill:none; vector-effect:non-scaling-stroke; pointer-events:none; }
  .mark-rubber   { stroke-dasharray:4 3; stroke-width:1.5; fill:none; vector-effect:non-scaling-stroke; pointer-events:none; opacity:.7; }
  .mark-vertex   { stroke:#fff; stroke-width:1; vector-effect:non-scaling-stroke; pointer-events:none; }
  .mark-vertex-first { fill:#fff; stroke-width:2.5; vector-effect:non-scaling-stroke; pointer-events:none; }
  .mark-fill     { stroke:none; pointer-events:none; }
  .mark-crop     { stroke:#f59e0b; stroke-width:2; stroke-dasharray:6 4; fill:#f59e0b; fill-opacity:.08; vector-effect:non-scaling-stroke; pointer-events:none; }
  #stage svg.cropping { cursor:crosshair; }
  .hint { padding: 6px 12px; font-size: 12px; color:#6b7280; background:#fff; border-bottom:1px solid #f3f4f6; }

  #palette {
    /* border-box so width:240px includes padding + border-right; without
       it the palette is actually 261px wide and the rightmost 21px sit
       under the stage (which starts at left:240px), clipping buttons. */
    box-sizing:border-box;
    position:absolute; left:0; top:48px; bottom:0; width:240px;
    background:#fff; border-right:1px solid #e5e7eb;
    display:flex; flex-direction:column; gap:10px;
    padding:10px 10px;
    font-size:12px;
  }
  #palette section { display:flex; flex-direction:column; gap:6px; }
  #palette section .label { color:#6b7280; font-weight:500; }
  #palette section .row { display:flex; gap:6px; }
  /* Material-style outlined selectable. Default = neutral 1px border;
     selected = primary-coloured 2px border + a soft state-layer halo
     + small elevation shadow. Border-width stays constant on toggle so
     there's no layout shift (the 1→2px swap is absorbed by box-sizing).
     Transitions make the state change feel like a Material ripple. */
  #palette button {
    box-sizing:border-box;
    border:1px solid #d1d5db; border-radius:8px; cursor:pointer;
    padding:0; background:#fff; font:inherit;
    display:flex; align-items:center; justify-content:center;
    min-width:0;
    transition: border-color .12s ease, box-shadow .12s ease;
  }
  #palette button:hover  { border-color:#9ca3af; background:#f9fafb; }
  #palette button.selected {
    border:2px solid #1e88ff;
    box-shadow: 0 0 0 3px rgba(30,136,255,.15),
                0 1px 3px  rgba(0,0,0,.08);
  }
  #palette .shape, #palette .mode, #palette .modepick, #palette .swatch, #palette .edit {
    flex:1; height:38px; color:#374151; font-size:20px; line-height:1;
  }
  #palette .modepick { font-size:13px; font-weight:500; }
  #palette button:disabled { opacity:.35; cursor:not-allowed; }
  #palette button:disabled:hover { border-color:#d1d5db; background:#fff; }
  #palette .edit[data-action="delete"]:not(:disabled):hover {
    border-color:#dc2626; color:#dc2626;
  }
  #stage svg.select-mode { cursor:default; }
  #palette .swatch .fill { display:block; width:100%; height:100%; border-radius:3px; }
</style>
</head>
<body>
  <div id="bar">
    <button id="crop"   title="Drag a rectangle to crop the saved SVG's viewBox">Crop</button>
    <button id="clear"  title="Remove shapes and undo any crop">Clear</button>
    <button id="finish" class="finish" title="Save snapshot SVG + append to patch JSON">Finish</button>
    <span id="status">Loading…</span>
  </div>
  <div class="hint">
    click to add vertex · click near first / right-click / dbl-click / Enter to close ·
    Backspace undo vertex · Esc abort · wheel zoom · Space-drag or middle-drag pan ·
    Crop = drag rectangle (Esc cancels)
  </div>
  <aside id="palette">
    <section id="mode-picker">
      <span class="label">Mode</span>
      <div class="row">
        <button class="modepick" data-mode="draw"   title="Draw new shapes">Draw</button>
        <button class="modepick" data-mode="select" title="Select / move / copy / restyle existing shapes">Select</button>
      </div>
    </section>

    <section id="shape-picker">
      <span class="label">Shape</span>
      <div class="row">
        <button class="shape" data-shape="polygon" title="Polygon">⬡</button>
        <button class="shape" data-shape="rect"    title="Rectangle (round corners)">▭</button>
        <button class="shape" data-shape="circle"  title="Circle">◯</button>
      </div>
      <div class="row">
        <button class="shape" data-shape="ellipse" title="Ellipse">⬭</button>
        <button class="shape" data-shape="line"    title="Line">／</button>
        <button class="shape" data-shape="arrow"   title="Arrow">→</button>
      </div>
    </section>

    <section id="edit-picker" style="display:none">
      <span class="label">Edit</span>
      <div class="row">
        <button class="edit" data-action="duplicate" title="Duplicate selected shape (⌘/Ctrl+D)">⧉</button>
        <button class="edit" data-action="delete"    title="Delete selected shape (Delete)">🗑</button>
      </div>
    </section>

    <section id="fill-toggle">
      <span class="label">Style</span>
      <div class="row">
        <button class="mode" data-outlined="false" title="Filled">Fill</button>
        <button class="mode" data-outlined="true"  title="Outline">Line</button>
      </div>
    </section>

    <section id="color-grid">
      <span class="label">Color</span>
      <div class="row">
        <!-- Material Blue 600 (#1e88ff) — pale / medium / strong -->
        <button class="swatch" data-fill="#1e88ff" data-opacity="0.15" title="Blue pale"  ><span class="fill" style="background:rgba(30,136,255,0.15)"></span></button>
        <button class="swatch" data-fill="#1e88ff" data-opacity="0.35" title="Blue medium"><span class="fill" style="background:rgba(30,136,255,0.35)"></span></button>
        <button class="swatch" data-fill="#1e88ff" data-opacity="0.65" title="Blue strong"><span class="fill" style="background:rgba(30,136,255,0.65)"></span></button>
      </div>
      <div class="row">
        <!-- Material Red 600 (#e53935) — pale / medium / strong -->
        <button class="swatch" data-fill="#e53935" data-opacity="0.15" title="Red pale"   ><span class="fill" style="background:rgba(229,57,53,0.15)"></span></button>
        <button class="swatch" data-fill="#e53935" data-opacity="0.35" title="Red medium" ><span class="fill" style="background:rgba(229,57,53,0.35)"></span></button>
        <button class="swatch" data-fill="#e53935" data-opacity="0.65" title="Red strong" ><span class="fill" style="background:rgba(229,57,53,0.65)"></span></button>
      </div>
    </section>
  </aside>
  <div id="stage"></div>

<script>
(() => {
  const stage   = document.getElementById('stage');
  const status  = document.getElementById('status');
  const palette = document.getElementById('palette');
  const finishBtn = document.getElementById('finish');
  const clearBtn  = document.getElementById('clear');
  const cropBtn   = document.getElementById('crop');

  const CLOSE_PX = 12;          // screen-pixel threshold for "near first vertex"
  const SVG_NS = 'http://www.w3.org/2000/svg';

  // The backend is authoritative for "what's saved": GET /svg returns
  // the original source, POST /save returns the composited result with
  // the new op baked in. We swap the <svg> element in #stage each time
  // the backend gives us new bytes. Frontend state below only tracks
  // edits that haven't been saved yet.
  let svg, staticOverlay, dynamicOverlay, selectionOverlay, cropOverlay;
  let current = [];             // vertices of the polygon being drawn
  let shapes  = [];             // closed shapes not yet sent to /save —
                                // each entry is {type, geom, color,
                                // outlined}; style fields lock at commit
                                // so later toolbar picks don't repaint
                                // earlier shapes.
  let cursorSVG = null;         // last cursor position in SVG coords
  let cursorShift = false;      // shift held at the moment of the latest
                                // mousemove (used to snap the drag preview)
  let spaceDown = false;
  let panning = false;
  let panStartSVG = null;
  let panStartVB  = null;
  let cropMode = false;         // Crop button armed; awaiting drag
  let cropDrag = null;          // { startSVG: [x,y] } once mousedown fires
  let dragShape = null;         // { startSVG } for non-polygon shape drag
  let suppressNextClick = false;// swallow the click that fires right
                                // after a crop-release mouseup
  let appliedViewBox  = null;   // crop committed by applyCropRect (cleared on save/clear)
  let currentPreop    = 'orig'; // next save's preop = last save's id
                                // (or 'orig' on first save / after Clear)
  let selectedShape   = 'polygon';
  let outlined        = false;
  let selectedColor   = { fill: '#1e88ff', opacity: 0.35 };

  // 'draw' = original behaviour (click/drag to create shapes).
  // 'select' = click an existing shape to highlight it, drag to move,
  // Cmd/Ctrl+D to duplicate, Delete/Backspace to remove, palette
  // colour / style picks apply to the selection instead of the global
  // default.
  let mode        = 'draw';
  let selectedIdx = -1;
  let moveDrag    = null;       // { startSVG, origGeom } while dragging a selected shape

  function setStatus(msg, kind) {
    status.textContent = msg;
    status.className = kind || '';
  }

  function clientToSVG(clientX, clientY) {
    const pt = svg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    const ctm = svg.getScreenCTM();
    if (!ctm) return null;
    const p = pt.matrixTransform(ctm.inverse());
    return [p.x, p.y];
  }

  function svgToClient(x, y) {
    const pt = svg.createSVGPoint();
    pt.x = x; pt.y = y;
    const ctm = svg.getScreenCTM();
    if (!ctm) return null;
    const p = pt.matrixTransform(ctm);
    return [p.x, p.y];
  }

  function ensureViewBox() {
    if (svg.hasAttribute('viewBox')) return;
    const w = parseFloat(svg.getAttribute('width'))  || svg.getBBox().width  || 1000;
    const h = parseFloat(svg.getAttribute('height')) || svg.getBBox().height || 1000;
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  }

  function clearChildren(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  function isLineLike(type) { return type === 'line' || type === 'arrow'; }

  // Hold Shift while drawing to constrain the drag:
  //   line / arrow → pure horizontal or vertical (whichever has the
  //                  larger delta).
  //   rect         → square (side = min |dx|, |dy|; direction kept so
  //                  the square stays in the same quadrant as the drag).
  function snapAxis(start, end) {
    const dx = Math.abs(end[0] - start[0]);
    const dy = Math.abs(end[1] - start[1]);
    return dx >= dy ? [end[0], start[1]] : [start[0], end[1]];
  }
  function snapSquare(start, end) {
    const dx = end[0] - start[0], dy = end[1] - start[1];
    const side = Math.min(Math.abs(dx), Math.abs(dy));
    return [start[0] + Math.sign(dx) * side,
            start[1] + Math.sign(dy) * side];
  }
  function maybeSnap(shape, start, end, shift) {
    if (!shift) return end;
    if (isLineLike(shape)) return snapAxis(start, end);
    if (shape === 'rect')  return snapSquare(start, end);
    return end;
  }

  // Arrow geometry — returns the stem endpoint (line ends here so it
  // doesn't poke past the head) and the three vertices of the filled
  // triangle head ``[tip, base1, base2]``. Drawing the head as a filled
  // <polygon> with the same colour as the stem keeps the arrowhead
  // colour-matched without relying on marker / context-stroke quirks.
  const ARROW_HEAD_HALF_ANGLE = 20 * Math.PI / 180;
  const ARROW_HEAD_LEN_MAX    = 12;
  const ARROW_HEAD_FRACTION   = 0.25;
  function arrowGeometry(x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const L = Math.hypot(dx, dy);
    if (L === 0) return null;
    const ang = Math.atan2(dy, dx);
    const hl  = Math.min(L * ARROW_HEAD_FRACTION, ARROW_HEAD_LEN_MAX);
    // Stem ends at the triangle base's projection along the line
    // (hl * cos(half_angle)) — not at distance hl — so it meets the
    // back edge of the head without a gap.
    const back = hl * Math.cos(ARROW_HEAD_HALF_ANGLE);
    const stem = [x2 - back * Math.cos(ang), y2 - back * Math.sin(ang)];
    const b1 = [x2 - hl * Math.cos(ang - ARROW_HEAD_HALF_ANGLE),
                y2 - hl * Math.sin(ang - ARROW_HEAD_HALF_ANGLE)];
    const b2 = [x2 - hl * Math.cos(ang + ARROW_HEAD_HALF_ANGLE),
                y2 - hl * Math.sin(ang + ARROW_HEAD_HALF_ANGLE)];
    return [stem, [[x2, y2], b1, b2]];
  }

  // Write a shape's geometry into an existing element. Reused by
  // createShapeElement (initial build) and the move-drag (in-place
  // mutation each mousemove, no DOM churn).
  function setShapeGeometry(el, s) {
    const c = s.geom;
    switch (s.type) {
      case 'polygon':
        el.setAttribute('points', c.points.map(p => p.join(',')).join(' '));
        break;
      case 'rect':
        el.setAttribute('x', c.x); el.setAttribute('y', c.y);
        el.setAttribute('width',  c.w); el.setAttribute('height', c.h);
        el.setAttribute('rx', c.rx);    el.setAttribute('ry', c.rx);
        break;
      case 'circle':
        el.setAttribute('cx', c.cx); el.setAttribute('cy', c.cy);
        el.setAttribute('r',  c.r);
        break;
      case 'ellipse':
        el.setAttribute('cx', c.cx); el.setAttribute('cy', c.cy);
        el.setAttribute('rx', c.rx); el.setAttribute('ry', c.ry);
        break;
      case 'line':
        el.setAttribute('x1', c.x1); el.setAttribute('y1', c.y1);
        el.setAttribute('x2', c.x2); el.setAttribute('y2', c.y2);
        break;
      case 'arrow': {
        // Stem <line> inherits stroke from the wrapping <g>; head
        // <polygon> overrides the group's fill="none" so the filled
        // triangle matches the stem's colour.
        while (el.firstChild) el.removeChild(el.firstChild);
        const geo = arrowGeometry(c.x1, c.y1, c.x2, c.y2);
        if (geo) {
          const [stem, tri] = geo;
          const line = document.createElementNS(SVG_NS, 'line');
          line.setAttribute('x1', c.x1); line.setAttribute('y1', c.y1);
          line.setAttribute('x2', stem[0]); line.setAttribute('y2', stem[1]);
          el.appendChild(line);
          const head = document.createElementNS(SVG_NS, 'polygon');
          head.setAttribute('points', tri.map(p => p.join(',')).join(' '));
          head.setAttribute('fill', s.color.fill);
          head.setAttribute('fill-opacity', s.color.opacity);
          head.setAttribute('stroke', 'none');
          el.appendChild(head);
        }
        break;
      }
    }
  }

  function createShapeElement(s) {
    const tag = (s.type === 'arrow') ? 'g' : s.type;
    const el  = document.createElementNS(SVG_NS, tag);
    setShapeGeometry(el, s);
    applyShapeStyle(el, s);
    return el;
  }

  function applyShapeStyle(el, s) {
    if (s.outlined || isLineLike(s.type)) {
      el.setAttribute('stroke',         s.color.fill);
      el.setAttribute('stroke-opacity', s.color.opacity);
      el.setAttribute('stroke-width',   2);
      el.setAttribute('vector-effect',  'non-scaling-stroke');
      el.setAttribute('fill',           'none');
    } else {
      el.setAttribute('fill',         s.color.fill);
      el.setAttribute('fill-opacity', s.color.opacity);
      el.setAttribute('stroke',       'none');
    }
  }

  // Convert a drag start + end into a shape body (no style yet).
  // Returns null for degenerate drags (zero size).
  function shapeFromDrag(type, start, end) {
    const [x0, y0] = start, [x1, y1] = end;
    let geom;
    switch (type) {
      case 'rect': {
        const w = Math.abs(x1 - x0), h = Math.abs(y1 - y0);
        if (w < 1 || h < 1) return null;
        geom = {
          x: Math.min(x0, x1), y: Math.min(y0, y1), w, h,
          rx: Math.min(w / 4, h / 4, 8),
        };
        break;
      }
      case 'circle': {
        const r = Math.hypot(x1 - x0, y1 - y0);
        if (r < 1) return null;
        geom = { cx: x0, cy: y0, r };
        break;
      }
      case 'ellipse': {
        const rx = Math.abs(x1 - x0) / 2, ry = Math.abs(y1 - y0) / 2;
        if (rx < 1 || ry < 1) return null;
        geom = { cx: (x0 + x1) / 2, cy: (y0 + y1) / 2, rx, ry };
        break;
      }
      case 'line':
      case 'arrow':
        if (Math.hypot(x1 - x0, y1 - y0) < 1) return null;
        geom = { x1: x0, y1: y0, x2: x1, y2: y1 };
        break;
      default:
        return null;
    }
    return { type, geom };
  }

  function shapeBBox(s) {
    const c = s.geom;
    switch (s.type) {
      case 'polygon': {
        const xs = c.points.map(p => p[0]);
        const ys = c.points.map(p => p[1]);
        return [Math.min(...xs), Math.min(...ys), Math.max(...xs), Math.max(...ys)];
      }
      case 'rect':    return [c.x, c.y, c.x + c.w, c.y + c.h];
      case 'circle':  return [c.cx - c.r,  c.cy - c.r,  c.cx + c.r,  c.cy + c.r];
      case 'ellipse': return [c.cx - c.rx, c.cy - c.ry, c.cx + c.rx, c.cy + c.ry];
      case 'line':
        return [Math.min(c.x1, c.x2), Math.min(c.y1, c.y2),
                Math.max(c.x1, c.x2), Math.max(c.y1, c.y2)];
      case 'arrow': {
        // Include the head triangle vertices — they extend past the stem
        // endpoints laterally. Matches Python svg.py:_shape_bbox.
        const geo = arrowGeometry(c.x1, c.y1, c.x2, c.y2);
        if (!geo) return null;
        const [, tri] = geo;
        const xs = [c.x1, c.x2, ...tri.map(p => p[0])];
        const ys = [c.y1, c.y2, ...tri.map(p => p[1])];
        return [Math.min(...xs), Math.min(...ys), Math.max(...xs), Math.max(...ys)];
      }
    }
    return null;
  }

  // Translate ``s`` by (dx, dy) relative to ``origGeom`` (the geom
  // snapshot taken at drag-start). Working from origGeom keeps the
  // motion absolute — without it, cumulative rounding would drift.
  function applyDelta(s, origGeom, dx, dy) {
    switch (s.type) {
      case 'polygon':
        s.geom.points = origGeom.points.map(([px, py]) => [px + dx, py + dy]);
        break;
      case 'rect':
        s.geom.x = origGeom.x + dx; s.geom.y = origGeom.y + dy;
        break;
      case 'circle':
      case 'ellipse':
        s.geom.cx = origGeom.cx + dx; s.geom.cy = origGeom.cy + dy;
        break;
      case 'line':
      case 'arrow':
        s.geom.x1 = origGeom.x1 + dx; s.geom.y1 = origGeom.y1 + dy;
        s.geom.x2 = origGeom.x2 + dx; s.geom.y2 = origGeom.y2 + dy;
        break;
    }
  }

  // Walk up from a click target until we hit a direct child of
  // staticOverlay; return its data-idx if any. -1 means the click
  // wasn't on a shape (and the caller should treat it as deselect).
  function findShapeIdx(target) {
    let el = target;
    while (el) {
      if (el.parentNode === staticOverlay && el.dataset && el.dataset.idx != null) {
        return parseInt(el.dataset.idx, 10);
      }
      el = el.parentNode;
    }
    return -1;
  }

  function selectShape(idx) {
    selectedIdx = idx;
    renderSelection();
    syncEditButtons();
  }

  function duplicateSelected() {
    if (selectedIdx < 0) return;
    const src   = shapes[selectedIdx];
    const clone = structuredClone(src);
    const off   = (svg.viewBox.baseVal.width || 1000) * 0.02;
    applyDelta(clone, src.geom, off, off);  // nudge so the copy is visible
    shapes.push(clone);
    selectedIdx = shapes.length - 1;
    renderStatic();
    renderSelection();
    syncEditButtons();
    setStatus(`Copied (${shapes.length} shape${shapes.length === 1 ? '' : 's'})`);
  }

  function deleteSelected() {
    if (selectedIdx < 0) return;
    shapes.splice(selectedIdx, 1);
    selectedIdx = -1;
    renderStatic();
    renderSelection();
    syncEditButtons();
    setStatus(`${shapes.length} shape${shapes.length === 1 ? '' : 's'}`);
  }

  function setMode(m) {
    if (m === mode) return;
    mode = m;
    if (m !== 'select') { selectedIdx = -1; moveDrag = null; }
    abortCurrent();
    dragShape = null;
    document.getElementById('shape-picker').style.display = (m === 'draw')   ? '' : 'none';
    document.getElementById('edit-picker' ).style.display = (m === 'select') ? '' : 'none';
    if (svg) svg.classList.toggle('select-mode', m === 'select');
    updateHint();
    renderStatic();
    renderSelection();
    syncEditButtons();
    setStatus(m === 'draw' ? 'Draw mode' : 'Select — click a shape');
  }

  function updateHint() {
    const hint = document.querySelector('.hint');
    hint.textContent = (mode === 'select')
      ? 'click a shape to select · drag to move · ⌘/Ctrl+D copy · Delete remove · Esc deselect · wheel zoom · Space-drag pan'
      : 'click to add vertex · click near first / right-click / dbl-click / Enter to close · Backspace undo vertex · Esc abort · wheel zoom · Space-drag or middle-drag pan · Crop = drag rectangle (Esc cancels)';
  }

  function syncEditButtons() {
    palette.querySelectorAll('.edit').forEach(b => b.disabled = (selectedIdx < 0));
  }

  function renderSelection() {
    clearChildren(selectionOverlay);
    if (mode !== 'select' || selectedIdx < 0 || !shapes[selectedIdx]) return;
    const bb = shapeBBox(shapes[selectedIdx]);
    if (!bb) return;
    const [x0, y0, x1, y1] = bb;
    const pad = (svg.viewBox.baseVal.width || 1000) * 0.005;
    const r = document.createElementNS(SVG_NS, 'rect');
    r.setAttribute('x', x0 - pad); r.setAttribute('y', y0 - pad);
    r.setAttribute('width',  x1 - x0 + 2 * pad);
    r.setAttribute('height', y1 - y0 + 2 * pad);
    r.setAttribute('fill', 'none');
    r.setAttribute('stroke', '#f59e0b');
    r.setAttribute('stroke-width', '2');
    r.setAttribute('stroke-dasharray', '6 4');
    r.setAttribute('vector-effect', 'non-scaling-stroke');
    r.style.pointerEvents = 'none';
    selectionOverlay.appendChild(r);
  }

  function renderStatic() {
    clearChildren(staticOverlay);
    for (let i = 0; i < shapes.length; i++) {
      const el = createShapeElement(shapes[i]);
      el.dataset.idx = String(i);
      el.style.pointerEvents = (mode === 'select') ? 'auto' : 'none';
      if (mode === 'select') el.style.cursor = 'move';
      staticOverlay.appendChild(el);
    }
  }

  function renderDynamic() {
    clearChildren(dynamicOverlay);
    // SVG inheritance: children of dynamicOverlay read stroke / fill
    // from here, so we update the colour once per call. The first-vertex
    // circle keeps its white interior via CSS (own fill wins over
    // inherited).
    dynamicOverlay.setAttribute('stroke', selectedColor.fill);
    dynamicOverlay.setAttribute('fill',   selectedColor.fill);

    // Drag-based shape in progress (rect / circle / ellipse / line / arrow).
    if (dragShape && cursorSVG) {
      const end = maybeSnap(selectedShape, dragShape.startSVG, cursorSVG, cursorShift);
      const tmp = shapeFromDrag(selectedShape, dragShape.startSVG, end);
      if (tmp) {
        tmp.color    = selectedColor;
        tmp.outlined = outlined;
        dynamicOverlay.appendChild(createShapeElement(tmp));
      }
      return;
    }

    if (current.length < 1) return;

    // Polygon-in-progress: polyline + rubber-band + vertex dots.
    const path = document.createElementNS(SVG_NS, 'polyline');
    path.setAttribute('class', 'mark-line');
    path.setAttribute('points', current.map(p => p.join(',')).join(' '));
    dynamicOverlay.appendChild(path);

    if (cursorSVG) {
      const last = current[current.length - 1];
      const rb = document.createElementNS(SVG_NS, 'line');
      rb.setAttribute('class', 'mark-rubber');
      rb.setAttribute('x1', last[0]); rb.setAttribute('y1', last[1]);
      rb.setAttribute('x2', cursorSVG[0]); rb.setAttribute('y2', cursorSVG[1]);
      dynamicOverlay.appendChild(rb);
    }

    const r = (svg.viewBox.baseVal.width || 1000) * 0.005;
    current.forEach((p, i) => {
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('class', i === 0 ? 'mark-vertex-first' : 'mark-vertex');
      c.setAttribute('cx', p[0]); c.setAttribute('cy', p[1]);
      c.setAttribute('r', i === 0 ? r * 1.6 : r);
      dynamicOverlay.appendChild(c);
    });
  }

  function commitDragShape(end, shift) {
    const snapped = maybeSnap(selectedShape, dragShape.startSVG, end, shift);
    const tmp = shapeFromDrag(selectedShape, dragShape.startSVG, snapped);
    dragShape = null;
    if (!tmp) { renderDynamic(); return; }
    tmp.color    = { ...selectedColor };
    tmp.outlined = outlined;
    shapes.push(tmp);
    renderStatic();
    renderDynamic();
    setStatus(`${shapes.length} shape${shapes.length === 1 ? '' : 's'}`);
  }

  function tryCloseNearFirst(clientX, clientY) {
    if (current.length < 3) return false;
    const first = current[0];
    const [cx, cy] = svgToClient(first[0], first[1]);
    const dx = cx - clientX, dy = cy - clientY;
    if (Math.hypot(dx, dy) <= CLOSE_PX) {
      closePolygon();
      return true;
    }
    return false;
  }

  function addVertex(clientX, clientY) {
    const p = clientToSVG(clientX, clientY);
    if (!p) return;
    current.push(p);
    renderDynamic();
  }

  function closePolygon() {
    if (current.length < 3) return;
    shapes.push({
      type:     'polygon',
      geom:    { points: current },
      color:    { ...selectedColor },
      outlined: outlined,
    });
    current = [];
    renderStatic();
    renderDynamic();
    setStatus(`${shapes.length} shape${shapes.length === 1 ? '' : 's'}`);
  }

  function abortCurrent() {
    if (!current.length) return;
    current = [];
    renderDynamic();
  }

  function popVertex() {
    if (!current.length) return;
    current.pop();
    renderDynamic();
  }

  async function clearAll() {
    setStatus('Loading orig…');
    try {
      const res = await fetch('/svg');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      installSvg(await res.text());
    } catch (err) {
      setStatus('Failed to load /svg: ' + err.message, 'err');
      return;
    }
    shapes = []; current = []; dragShape = null;
    appliedViewBox = null;
    currentPreop = 'orig';
    cancelCrop();
    setStatus('Ready — click to mark');
  }

  function vbToString(vb) {
    return `${vb.x} ${vb.y} ${vb.width} ${vb.height}`;
  }

  function armCrop() {
    cropMode = true;
    cropDrag = null;
    abortCurrent();
    svg.classList.add('cropping');
    cropBtn.classList.add('active');
    setStatus('Crop: drag a rectangle (Esc cancels)');
  }

  function cancelCrop() {
    cropMode = false;
    cropDrag = null;
    svg.classList.remove('cropping');
    cropBtn.classList.remove('active');
    clearChildren(cropOverlay);
  }

  function applyCropRect(p0, p1) {
    const x = Math.min(p0[0], p1[0]);
    const y = Math.min(p0[1], p1[1]);
    const w = Math.abs(p1[0] - p0[0]);
    const h = Math.abs(p1[1] - p0[1]);
    if (w < 1 || h < 1) { cancelCrop(); setStatus('Crop cancelled (rect too small)'); return; }
    const vb = svg.viewBox.baseVal;
    vb.x = x; vb.y = y; vb.width = w; vb.height = h;
    appliedViewBox = vbToString(vb);
    cancelCrop();
    setStatus(`Cropped to ${w.toFixed(1)} × ${h.toFixed(1)} (saved on Finish)`);
  }

  function renderCrop() {
    clearChildren(cropOverlay);
    if (!cropDrag || !cursorSVG) return;
    const [x0, y0] = cropDrag.startSVG;
    const [x1, y1] = cursorSVG;
    const r = document.createElementNS(SVG_NS, 'rect');
    r.setAttribute('class', 'mark-crop');
    r.setAttribute('x', Math.min(x0, x1));
    r.setAttribute('y', Math.min(y0, y1));
    r.setAttribute('width',  Math.abs(x1 - x0));
    r.setAttribute('height', Math.abs(y1 - y0));
    cropOverlay.appendChild(r);
  }

  function zoomAt(clientX, clientY, factor) {
    const before = clientToSVG(clientX, clientY);
    const vb = svg.viewBox.baseVal;
    vb.width  *= factor;
    vb.height *= factor;
    const after = clientToSVG(clientX, clientY);
    vb.x += before[0] - after[0];
    vb.y += before[1] - after[1];
  }

  // Window listeners are bound ONCE in boot(); they read the live ``svg``
  // global so they keep working after installSvg() swaps in a new element.
  function bindWindowEvents() {
    window.addEventListener('mousemove', e => {
      if (panning) {
        const vb = svg.viewBox.baseVal;
        vb.x = panStartVB.x;
        vb.y = panStartVB.y;
        const now = clientToSVG(e.clientX, e.clientY);
        vb.x = panStartVB.x - (now[0] - panStartSVG[0]);
        vb.y = panStartVB.y - (now[1] - panStartSVG[1]);
        return;
      }
      cursorSVG   = clientToSVG(e.clientX, e.clientY);
      cursorShift = e.shiftKey;
      if (cropDrag)  { renderCrop();   return; }
      if (moveDrag && selectedIdx >= 0) {
        const dx = cursorSVG[0] - moveDrag.startSVG[0];
        const dy = cursorSVG[1] - moveDrag.startSVG[1];
        const s  = shapes[selectedIdx];
        applyDelta(s, moveDrag.origGeom, dx, dy);
        setShapeGeometry(moveDrag.el, s);
        renderSelection();
        return;
      }
      if (dragShape) { renderDynamic(); return; }
      if (current.length) renderDynamic();
    });

    window.addEventListener('mouseup', e => {
      if (panning) { panning = false; svg.classList.remove('panning'); return; }
      if (cropDrag) {
        const end = clientToSVG(e.clientX, e.clientY) || cursorSVG;
        applyCropRect(cropDrag.startSVG, end);
        suppressNextClick = true;
        return;
      }
      if (moveDrag) {
        moveDrag = null;
        suppressNextClick = true;
        return;
      }
      if (dragShape) {
        const end = clientToSVG(e.clientX, e.clientY) || cursorSVG;
        commitDragShape(end, e.shiftKey);
        suppressNextClick = true;
      }
    });

    window.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'Escape') {
        e.preventDefault();
        if (cropMode) { cancelCrop(); setStatus('Crop cancelled'); }
        else if (mode === 'select' && selectedIdx >= 0) {
          selectedIdx = -1;
          renderStatic();
          setStatus('Selection cleared');
        }
        else abortCurrent();
      }
      else if (e.key === 'Enter') {
        if (mode === 'draw') { e.preventDefault(); closePolygon(); }
      }
      else if (e.key === 'Backspace' || e.key === 'Delete') {
        e.preventDefault();
        if (mode === 'select' && selectedIdx >= 0) deleteSelected();
        else popVertex();
      }
      else if ((e.key === 'd' || e.key === 'D') && (e.metaKey || e.ctrlKey)
               && mode === 'select' && selectedIdx >= 0) {
        e.preventDefault();
        duplicateSelected();
      }
      else if (e.key === ' ')         { spaceDown = true; svg.style.cursor = 'grab'; e.preventDefault(); }
      else if (e.key === 'Shift' && dragShape) {
        cursorShift = true;
        renderDynamic();   // snap the preview immediately
      }
    });
    window.addEventListener('keyup', e => {
      if (e.key === ' ')     { spaceDown = false; svg.style.cursor = ''; }
      if (e.key === 'Shift' && dragShape) {
        cursorShift = false;
        renderDynamic();
      }
    });
  }

  // Re-bound on every installSvg() because the <svg> element itself is
  // replaced. Old listeners die with the discarded element.
  function bindSvgEvents() {
    svg.addEventListener('contextmenu', e => {
      if (mode !== 'draw') return;
      e.preventDefault();
      closePolygon();
    });

    svg.addEventListener('mousedown', e => {
      if (cropMode && e.button === 0) {
        e.preventDefault();
        cropDrag = { startSVG: clientToSVG(e.clientX, e.clientY) };
        return;
      }
      if (e.button === 1 || (e.button === 0 && spaceDown)) {
        e.preventDefault();
        panning = true;
        svg.classList.add('panning');
        const vb = svg.viewBox.baseVal;
        panStartVB = { x: vb.x, y: vb.y, w: vb.width, h: vb.height };
        panStartSVG = clientToSVG(e.clientX, e.clientY);
        return;
      }
      if (mode === 'select' && e.button === 0) {
        e.preventDefault();
        const idx = findShapeIdx(e.target);
        if (idx >= 0) {
          selectShape(idx);
          moveDrag = {
            startSVG: clientToSVG(e.clientX, e.clientY),
            origGeom: structuredClone(shapes[idx].geom),
            el:       staticOverlay.children[idx],
          };
        } else if (selectedIdx >= 0) {
          selectedIdx = -1;
          renderSelection();
          syncEditButtons();
        }
        return;
      }
      // Drag-based shapes: rect / circle / ellipse / line / arrow.
      // Polygon stays click-driven (no drag).
      if (e.button === 0 && selectedShape !== 'polygon') {
        e.preventDefault();
        dragShape = { startSVG: clientToSVG(e.clientX, e.clientY) };
      }
    });

    svg.addEventListener('click', e => {
      if (e.button !== 0) return;
      if (suppressNextClick) { suppressNextClick = false; return; }
      if (cropMode || spaceDown) return;
      if (mode === 'select') return;             // mousedown already handled it
      if (selectedShape !== 'polygon') return;   // drag shapes commit via mouseup
      if (tryCloseNearFirst(e.clientX, e.clientY)) return;
      addVertex(e.clientX, e.clientY);
    });

    svg.addEventListener('dblclick', e => {
      if (cropMode || mode === 'select' || selectedShape !== 'polygon') return;
      // The two clicks of the dblclick each fired and added a vertex.
      // Pop the duplicate before closing.
      if (current.length >= 1) current.pop();
      closePolygon();
    });

    svg.addEventListener('wheel', e => {
      e.preventDefault();
      const factor = e.deltaY > 0 ? 1.15 : 1 / 1.15;
      zoomAt(e.clientX, e.clientY, factor);
    }, { passive: false });
  }

  // Swap whatever <svg> is currently in #stage with the one parsed from
  // ``text``. Each call recreates the overlay groups (the new SVG
  // element has none of our previous mark-* children) and rebinds
  // svg-specific event listeners on the new element.
  function installSvg(text) {
    const doc = new DOMParser().parseFromString(text, 'image/svg+xml');
    if (doc.querySelector('parsererror')) {
      setStatus('SVG parse error', 'err');
      console.error(doc.querySelector('parsererror').textContent);
      return;
    }
    clearChildren(stage);
    svg = doc.documentElement;
    stage.appendChild(svg);
    ensureViewBox();

    const overlay = document.createElementNS(SVG_NS, 'g');
    overlay.setAttribute('class', 'mark-overlay');

    staticOverlay    = document.createElementNS(SVG_NS, 'g');
    selectionOverlay = document.createElementNS(SVG_NS, 'g');
    dynamicOverlay   = document.createElementNS(SVG_NS, 'g');
    cropOverlay      = document.createElementNS(SVG_NS, 'g');
    // Selection sits between static (drawn shapes) and dynamic (in-progress
    // overlay) so the marker is visible above shapes but below any rubber-
    // band / cursor preview.
    overlay.appendChild(staticOverlay);
    overlay.appendChild(selectionOverlay);
    overlay.appendChild(dynamicOverlay);
    overlay.appendChild(cropOverlay);
    svg.appendChild(overlay);

    bindSvgEvents();
    renderStatic();
    renderSelection();
    renderDynamic();
  }

  async function finish() {
    finishBtn.disabled = true;
    setStatus('Saving…');
    try {
      const res = await fetch('/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          shapes,
          viewBox: appliedViewBox,
          preop:   currentPreop,
        }),
      });
      if (!res.ok) {
        // Server sends JSON ``{error}`` only on the failure path.
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || ('HTTP ' + res.status));
      }
      // Success path is raw SVG; op metadata rides in X-Op-* headers.
      const opId = res.headers.get('X-Op-Id');
      installSvg(await res.text());
      shapes = []; current = []; dragShape = null;
      appliedViewBox = null;
      currentPreop = opId;
      setStatus(
        `Saved op ${opId} (preop ${res.headers.get('X-Op-Preop')}) → ${res.headers.get('X-Op-Path')}`,
        'ok',
      );
    } catch (err) {
      setStatus('Save failed: ' + err.message, 'err');
    } finally {
      finishBtn.disabled = false;
    }
  }

  function bindPalette() {
    // Mutually-exclusive button group helper: clicking a button selects
    // it (visually) and runs ``onSelect`` once. Used for shapes, fill
    // mode, and colour swatches alike — same UX pattern.
    function bindGroup(buttons, isCurrent, onSelect) {
      buttons.forEach(b => {
        b.addEventListener('click', () => {
          buttons.forEach(o => o.classList.remove('selected'));
          b.classList.add('selected');
          onSelect(b);
        });
        if (isCurrent(b)) b.classList.add('selected');
      });
    }

    bindGroup(
      palette.querySelectorAll('.modepick'),
      b => b.dataset.mode === mode,
      b => setMode(b.dataset.mode),
    );

    palette.querySelectorAll('.edit').forEach(b => {
      b.addEventListener('click', () => {
        if (b.dataset.action === 'duplicate') duplicateSelected();
        else if (b.dataset.action === 'delete') deleteSelected();
      });
    });
    bindGroup(
      palette.querySelectorAll('.shape'),
      b => b.dataset.shape === selectedShape,
      b => { selectedShape = b.dataset.shape; abortCurrent(); dragShape = null; renderDynamic(); },
    );
    bindGroup(
      palette.querySelectorAll('.mode'),
      b => (b.dataset.outlined === 'true') === outlined,
      b => {
        outlined = b.dataset.outlined === 'true';
        if (mode === 'select' && selectedIdx >= 0) {
          shapes[selectedIdx].outlined = outlined;
          renderStatic();
        } else {
          renderDynamic();
        }
      },
    );
    bindGroup(
      palette.querySelectorAll('.swatch'),
      b => b.dataset.fill === selectedColor.fill
        && parseFloat(b.dataset.opacity) === selectedColor.opacity,
      b => {
        selectedColor = {
          fill:    b.dataset.fill,
          opacity: parseFloat(b.dataset.opacity),
        };
        if (mode === 'select' && selectedIdx >= 0) {
          shapes[selectedIdx].color = { ...selectedColor };
          renderStatic();
        } else {
          renderDynamic();
        }
      },
    );
  }

  async function boot() {
    setStatus('Loading SVG…');
    bindWindowEvents();
    bindPalette();
    updateHint();
    finishBtn.addEventListener('click', finish);
    clearBtn.addEventListener('click', clearAll);
    cropBtn.addEventListener('click', armCrop);
    try {
      const res = await fetch('/svg');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      installSvg(await res.text());
      setStatus('Ready — click to mark');
    } catch (err) {
      setStatus('Failed to load /svg: ' + err.message, 'err');
    }
  }

  boot();
})();
</script>
</body>
</html>
