<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PhysiClaw QR</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    body { font-family: system-ui; text-align: center; padding: 40px; background: #f9fafb; color: #111827; }
    .qr { display: inline-block; padding: 24px; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    canvas { display: block; margin: 10px auto; }
    p { font-size: 13px; color: #6b7280; word-break: break-all; max-width: 320px; margin: 4px auto; }
    p.ip { color: #9ca3af; }
    p.note { color: #d97706; font-size: 12px; margin: 8px auto 24px; }
  </style>
</head>
<body>
  <h2>PhysiClaw — Scan with Phone</h2>
  <p class="note">Open this page in <strong>Chrome</strong> or <strong>Safari</strong></p>
  <div class="qr">
    <canvas id="qr1"></canvas>
    <p>__PHONE_URL__</p>
    <p class="ip">__PHONE_URL_FALLBACK__</p>
  </div>
  <script>
    var qr = qrcode(0, 'M');
    qr.addData('__PHONE_URL__');
    qr.make();
    var canvas = document.getElementById('qr1');
    var ctx = canvas.getContext('2d');
    var size = 240, cells = qr.getModuleCount(), cell = size / cells;
    canvas.width = canvas.height = size;
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = '#000';
    for (var r = 0; r < cells; r++)
      for (var c = 0; c < cells; c++)
        if (qr.isDark(r, c)) ctx.fillRect(c * cell, r * cell, cell, cell);
  </script>
</body>
</html>
